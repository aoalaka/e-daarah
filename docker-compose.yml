services:
  mysql:
    image: mysql:8.0
    container_name: madrasah-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: madrasah_admin
      MYSQL_USER: madrasah_user
      MYSQL_PASSWORD: madrasah_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: madrasah-backend
    restart: unless-stopped
    ports:
      - "5001:5000"
    env_file:
      - .env.local
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

  frontend:
    image: node:20-alpine
    container_name: madrasah-frontend
    restart: unless-stopped
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5001
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npx vite --host 0.0.0.0"

  stripe-cli:
    image: stripe/stripe-cli:latest
    container_name: madrasah-stripe
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - .env.local
    entrypoint: /bin/sh
    command:
      - -c
      - "stripe listen --api-key $$STRIPE_SECRET_KEY --forward-to http://backend:5000/api/billing/webhook --skip-verify"
    volumes:
      - ~/.config/stripe:/root/.config/stripe

volumes:
  mysql_data:
